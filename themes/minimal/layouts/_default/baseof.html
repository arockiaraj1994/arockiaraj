<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="canonical" href="{{ .Permalink }}">
    
    <!-- Modern CSS Framework inspired by GitHub and modern design -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #24292f;
            background-color: #ffffff;
            font-size: 16px;
        }
        
        .container {
            max-width: 1012px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Header */
        .header {
            background: #ffffff;
            border-bottom: 1px solid #d1d9e0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 3px rgba(27,31,35,0.12);
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #24292f;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        
        .logo:hover {
            color: #0969da;
        }
        
        .nav {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        
        .nav a {
            color: #656d76;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        
        .nav a:hover {
            color: #24292f;
            background-color: #f6f8fa;
        }
        
        /* Main content */
        .main {
            padding: 32px 0;
            min-height: calc(100vh - 200px);
        }
        
        .content {
            background: #ffffff;
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid #d1d9e0;
        }
        
        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            color: #24292f;
            font-weight: 600;
            margin-bottom: 16px;
            line-height: 1.25;
        }
        
        h1 { font-size: 32px; margin-bottom: 24px; }
        h2 { font-size: 24px; margin-top: 32px; }
        h3 { font-size: 20px; margin-top: 24px; }
        h4 { font-size: 18px; margin-top: 20px; }
        
        p {
            margin-bottom: 16px;
            line-height: 1.6;
        }
        
        /* Links */
        a {
            color: #0969da;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        /* Code */
        code {
            background: #f6f8fa;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
            color: #24292f;
        }
        
        pre {
            background: #f6f8fa;
            border: 1px solid #d1d9e0;
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            margin: 16px 0;
        }
        
        pre code {
            background: none;
            padding: 0;
            border-radius: 0;
        }
        
        /* Lists */
        ul, ol {
            padding-left: 24px;
            margin-bottom: 16px;
        }
        
        li {
            margin-bottom: 8px;
        }
        
        /* Post meta */
        .post-meta {
            color: #656d76;
            font-size: 14px;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .post-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .tag {
            background: #eff2f5;
            color: #656d76;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
        }
        
        .tag:hover {
            background: #d1d9e0;
            color: #24292f;
        }
        
        /* Post list */
        .post-list {
            list-style: none;
            padding: 0;
        }
        
        .post-item {
            border: 1px solid #d1d9e0;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 16px;
            background: #ffffff;
            transition: all 0.2s ease;
        }
        
        .post-item:hover {
            border-color: #0969da;
            box-shadow: 0 3px 12px rgba(27,31,35,0.15);
        }
        
        .post-item h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
        }
        
        .post-item h3 a {
            color: #24292f;
            text-decoration: none;
        }
        
        .post-item h3 a:hover {
            color: #0969da;
        }
        
        .post-summary {
            color: #656d76;
            margin: 8px 0;
        }
        
        /* Social links */
        .social-links {
            display: flex;
            gap: 16px;
            margin: 24px 0;
        }
        
        .social-link {
            background: #f6f8fa;
            color: #656d76;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #d1d9e0;
            transition: all 0.2s ease;
        }
        
        .social-link:hover {
            background: #0969da;
            color: #ffffff;
            border-color: #0969da;
        }
        
        /* Footer */
        .footer {
            background: #f6f8fa;
            border-top: 1px solid #d1d9e0;
            padding: 32px 0;
            text-align: center;
            color: #656d76;
            font-size: 14px;
        }
        
        /* Home page hero */
        .hero {
            text-align: center;
            padding: 48px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            margin-bottom: 32px;
        }
        
        .hero h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .hero p {
            font-size: 20px;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 16px;
            }
            
            .header-content {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
            
            .nav {
                gap: 16px;
            }
            
            .content {
                padding: 20px;
            }
            
            .hero h1 {
                font-size: 32px;
            }
            
            .hero p {
                font-size: 18px;
            }
            
            .post-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">{{ .Site.Title }}</a>
                <nav class="nav">
                    {{ range .Site.Menus.main }}
                        <a href="{{ .URL }}">{{ .Name }}</a>
                    {{ end }}
                </nav>
            </div>
        </div>
    </header>
    
    <main class="main">
        <div class="container">
            {{ block "main" . }}{{ end }}
        </div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>&copy; {{ now.Format "2006" }} {{ .Site.Params.author }}. Built with Hugo.</p>
        </div>
    </footer>
</body>
</html>
