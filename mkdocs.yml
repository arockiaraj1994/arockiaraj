site_name: Arockiaraj
site_description: Comprehensive project documentation
site_author: Arockiaraj
site_url: https://example.com/

# Repository
repo_name: arockiaraj
repo_url: https://github.com/arockiaraj/arockiaraj
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2024 Arockiaraj

# Configuration
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
  palette:
    primary: indigo
    accent: indigo

# Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true

# Navigation structure
nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
  - User Guide:
    - Overview: user-guide/overview.md
    - Advanced Usage: user-guide/advanced-usage.md
  - API Reference: api-reference.md
  - Contributing: contributing.md
