name: Build and deploy Hugo site
on:
  push:
    branches:
      - main
      #- dev  # Added dev branch for testing
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.135.0  # Compatible with hugo-coder theme (min 0.124.0)
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
      
      - name: Debug submodules
        run: |
          echo "Checking submodule status:"
          git submodule status
          echo "Checking themes directory:"
          ls -la themes/
          echo "Checking hugo-coder theme:"
          ls -la themes/hugo-coder/ || echo "hugo-coder directory not found"
      
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      
      - name: Verify Hugo setup
        run: |
          echo "Hugo version:"
          hugo version
          echo "Theme directory contents:"
          ls -la themes/hugo-coder/layouts/ || echo "No layouts directory found"
          echo "Config check:"
          hugo config | grep -i theme || echo "No theme config found"
      
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
